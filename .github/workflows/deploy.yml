name: Auto Deploy Microservices

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ================= USER SERVICE =================
      - name: Build & Push UserService
        run: |
          docker build \
          --build-arg JAR_FILE=services/UserService/target/userservice-0.0.1-SNAPSHOT.jar \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest .
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest

      # ================= LOCATION SERVICE =================
      - name: Build & Push LocationService
        run: |
          docker build \
          --build-arg JAR_FILE=services/LocationService/target/locationservice-0.0.1-SNAPSHOT.jar \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/location-service:latest .
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/location-service:latest

      # ================= DEPLOY TO SERVER =================
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Pulling latest images..."

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/location-service:latest

            echo "Stopping old containers..."

            docker stop user-service || true
            docker rm user-service || true

            docker stop location-service || true
            docker rm location-service || true

            echo "Running new containers..."

            docker run -d --restart unless-stopped \
              --name user-service \
              -p 5004:5004 \
              ${{ secrets.DOCKER_USERNAME }}/user-service:latest

            docker run -d --restart unless-stopped \
              --name location-service \
              -p 5005:5005 \
              ${{ secrets.DOCKER_USERNAME }}/location-service:latest

            echo "Deployment completed!"
